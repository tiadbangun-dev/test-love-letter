<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Letter untukmu 💕</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Stars Background -->
    <div class="stars" id="stars"></div>

    <!-- Page 1: Hero -->
    <div id="page1" class="page active">
        <h1>💕 Love Letter 💕</h1>
        <p>Tulis surat cinta terindahmu di bawah cahaya bintang ✨</p>
        <button class="start-btn" onclick="nextPage(2)">Mulai Menulis ❤️</button>
    </div>

    <!-- Page 2: Love Letter -->
    <div id="page2" class="page">
        <div class="diary-container">
            <div class="diary-title">📖 Surat Cinta untukmu 📖</div>
            <textarea id="loveLetter" maxlength="2500" placeholder="Aku ingin bilang bahwa... 
💕 Kamu adalah cahaya di hidupku...
🌹 Setiap hari bersamamu seperti mimpi...
✨ Tulis semua perasaanmu di sini 💖
(Can use emoji! Max 2500 karakter)"></textarea>
            <div class="char-count" id="charCount">0/2500</div>
            <button class="next-btn" onclick="nextPage(3)">Lanjut Gambar Bunga 🌸</button>
        </div>
    </div>

    <!-- Page 3: Drawing -->
    <div id="page3" class="page">
        <div class="drawing-container">
            <h2 class="canvas-title">🌺 Gambar Bunga untuk Pasanganmu 🌺</h2>
            <canvas id="drawingCanvas" width="800" height="500"></canvas>
            <div class="tools">
                <button class="tool-btn brush-btn active" onclick="setTool('brush')">🖌️ Kuas</button>
                <button class="tool-btn eraser-btn" onclick="setTool('eraser')">🧽 Hapus</button>
                <button class="tool-btn clear-btn" onclick="clearCanvas()">🗑️ Bersihkan</button>
                
                <button class="color-btn" style="background:#ff69b4" onclick="setColor('#ff69b4')"></button>
                <button class="color-btn" style="background:#ff1493" onclick="setColor('#ff1493')"></button>
                <button class="color-btn" style="background:#ffb6c1" onclick="setColor('#ffb6c1')"></button>
                <button class="color-btn" style="background:#00d4aa" onclick="setColor('#00d4aa')"></button>
                <button class="color-btn" style="background:#ffd700" onclick="setColor('#ffd700')"></button>
                <button class="color-btn" style="background:#ffffff" onclick="setColor('#ffffff')"></button>
            </div>
            <button class="share-btn" onclick="generateShareLink()">Bagikan ke Pasangan 💌</button>
        </div>
    </div>

    <!-- Page 4: Share -->
    <div id="page4" class="page">
        <div class="share-container">
            <h2 class="share-title">✨ Tautan Surat Cintamu Siap! ✨</h2>
            <p>Copy link ini dan kirim ke pasanganmu 💕</p>
            <input type="text" id="shareLink" readonly>
            <br>
            <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
            <p style="margin-top: 2rem; opacity: 0.8;">Dia akan bisa melihat surat cinta + gambar bungamu! 🌹</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
